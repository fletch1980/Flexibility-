  var stateChecked = useState({});

  var stateExpanded = useState({});

  function toggle(key) { setChecked(function(p) { var n = Object.assign({}, p); n[key] = !p[key]; return n; }); }

  var done = exercises.filter(function(_, i) { return !!checked[tab + "-" + phase + "-" + i]; }).length;
  var total = exercises.length;
  var pct = (done / total) * 100;

  return React.createElement("div", { style: { fontFamily: "system-ui, sans-serif", maxWidth: 460, margin: "0 auto", padding: 16, backgroundColor: "#0a0010", minHeight: "100vh" } },

    React.createElement("div", { style: { background: "linear-gradient(135deg, #4a0080, #7c3aed)", borderRadius: 14, padding: "18px 20px", color: "white", marginBottom: 16 } },

      React.createElement("div", { style: { fontSize: 12, opacity: 0.85, marginTop: 4 } }, done + " of " + total + " complete")

    React.createElement("div", { style: { display: "flex", background: "#1a0030", borderRadius: 10, padding: 4, marginBottom: 16 } },

    React.createElement("div", { style: { marginBottom: 16 } },

    React.createElement("div", { style: { background: "#1a0030", borderRadius: 8, padding: "10px 14px", fontSize: 12, color: "#a78bfa", marginBottom: 16, fontWeight: 600 } },

    exercises.map(function(ex, i) {

      return React.createElement("div", { key: i, style: { background: isDone ? "#0f1f0f" : "#1a0030", border: "2px solid " + (isDone ? "#166534" : "#3b0764"), borderRadius: 12, padding: "14px 16px", marginBottom: 12 } },

        React.createElement("div", { onClick: function() { toggle(checkKey); }, style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6, cursor: "pointer" } },
